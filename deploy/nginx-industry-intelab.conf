# nginx-industry-intelab.conf — industry.intelab.cn 公网 HTTPS 反代
# 部署位置:#1 /etc/nginx/sites-available/industry.intelab.cn
# 启用:ln -sf ... /etc/nginx/sites-enabled/industry.intelab.cn
# SSL 证书:由 certbot 申请并自动管理(Let's Encrypt)
#
# 流程:
#   1. DNS 加 A 记录:industry.intelab.cn → 124.71.219.208(用户在阿里云加,5-30 分钟生效)
#   2. 把此文件 cp 到 #1 + ln -s(用 nginx -t 检查语法)
#   3. certbot certonly --webroot 申请 SSL 证书(脚本: install-public-nginx.sh)
#   4. nginx -s reload
#
# 复用 arch.intelab.cn 模式,backend 服务为 docker compose 启动的 frontend 容器,
# 公网 443 → 127.0.0.1:8081(只本机可达,不直接对外)

upstream industry_value_flow_frontend {
    server 127.0.0.1:8081;
    keepalive 16;
}

# 1. HTTP 重定向到 HTTPS
server {
    listen 80;
    listen [::]:80;
    server_name industry.intelab.cn;

    # certbot 验证用(acme-challenge),不要重定向
    location /.well-known/acme-challenge/ {
        root /var/www/letsencrypt;
    }

    # 其他全部 301 → HTTPS
    location / {
        return 301 https://$host$request_uri;
    }
}

# 2. HTTPS 反代到 industry-value-flow frontend 容器
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name industry.intelab.cn;

    # SSL 由 certbot 自动管理(申请后 certbot 会注入下面的字段,这里留 placeholder)
    # ssl_certificate /etc/letsencrypt/live/industry.intelab.cn/fullchain.pem;
    # ssl_certificate_key /etc/letsencrypt/live/industry.intelab.cn/privkey.pem;
    # include /etc/letsencrypt/options-ssl-nginx.conf;
    # ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    # 日志
    access_log /var/log/nginx/industry-intelab.access.log;
    error_log  /var/log/nginx/industry-intelab.error.log warn;

    # 上传大小(LLM 调用可能上传长 prompt)
    client_max_body_size 10M;

    # 反代核心
    location / {
        proxy_pass http://industry_value_flow_frontend;

        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection        "";

        proxy_connect_timeout 10s;
        proxy_send_timeout    60s;
        proxy_read_timeout    60s;
    }

    # 健康检查(单独 fast-path)
    location = /healthz {
        proxy_pass http://industry_value_flow_frontend/api/settings/llm;
        access_log off;
    }
}
