name: CI

# Fast feedback on every push and PR: backend pytest + frontend vitest in
# parallel, then an e2e job that boots backend + frontend and runs the
# Playwright smoke test against a real browser.
#
# LLM tests in this repo do NOT need a real API key — all HTTP calls are
# mocked via `respx`. So CI runs without any secrets.

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend:
    name: backend (pytest)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"
      - name: Run pytest
        # No real LLM calls — respx mocks all HTTP. No secrets needed.
        run: python -m pytest

  frontend:
    name: frontend (vitest)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./frontend
    steps:
      - uses: actions/checkout@v4
      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - name: Install dependencies
        run: npm ci
      - name: Type-check
        run: npx tsc --noEmit
      - name: Run vitest
        run: npx vitest run

  e2e:
    name: e2e (Playwright)
    runs-on: ubuntu-latest
    needs: [backend, frontend]
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - name: Install backend deps
        run: |
          python -m pip install --upgrade pip
          pip install -e .
      - name: Install frontend deps
        working-directory: ./frontend
        run: npm ci
      - name: Install Playwright browser
        working-directory: ./frontend
        # `--with-deps` requires sudo (available on ubuntu-latest runners).
        run: npx playwright install --with-deps chromium
      - name: Run E2E-001
        working-directory: ./frontend
        # Webserver config starts backend + frontend automatically; CI mode
        # forces fresh servers (`reuseExistingServer: false`).
        run: npx playwright test
      - name: Upload Playwright report on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: frontend/playwright-report/
          retention-days: 7
