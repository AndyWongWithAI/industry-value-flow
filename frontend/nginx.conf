# frontend/nginx.conf — Vite 静态资源 + /api 反代
#
# 用法:被 frontend/Dockerfile Stage 2 COPY 到 /etc/nginx/conf.d/default.conf
#
# 路由:
#   /                  → SPA fallback(try_files,所有未命中 → index.html)
#   /api/*             → 反代到 backend 容器(docker-compose 服务名 "backend",端口 8000)
#   /assets/*, /favicon.ico 等静态资源 → 直接 serve /usr/share/nginx/html/

server {
    listen 80;
    listen [::]:80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # gzip(react + 力导向图体积不小)
    gzip on;
    gzip_types text/plain text/css application/javascript application/json image/svg+xml;
    gzip_min_length 1024;

    # 反代 backend 容器 — 用 docker compose 服务名 "backend"(自动 DNS 解析)
    # 注意:容器内不能写 127.0.0.1,那是容器自己;跨容器要走服务名
    location /api/ {
        proxy_pass http://backend:8000;

        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_connect_timeout 10s;
        proxy_send_timeout    60s;
        proxy_read_timeout    60s;
    }

    # 静态资源 — 带 hash 的 Vite 资产可以长缓存
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # SPA fallback — 所有未命中的路由回 index.html(React Router 需要)
    location / {
        try_files $uri $uri/ /index.html;
    }
}
